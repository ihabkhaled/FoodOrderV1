name: v1.7 One-time Branch Normalization

on:
  push:
    branches: ['1.7.0']
    paths:
      - '.github/workflows/v170-normalize-branch-once.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: v170-normalize-branch-once
  cancel-in-progress: false

jobs:
  normalize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
        with:
          ref: 1.7.0
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: 26
          cache: npm
      - name: Remove superseded files and make replay precedence explicit
        shell: bash
        run: |
          python <<'PY'
          from pathlib import Path

          for obsolete in [
              Path('src/modules/order-sessions/hooks/use-order-session-details.hook.ts'),
              Path('src/modules/order-sessions/types/data-access-compatibility.d.ts'),
          ]:
              obsolete.unlink(missing_ok=True)

          gateway_path = Path('src/modules/data-access/gateways/local-order-session.gateway.ts')
          source = gateway_path.read_text(encoding='utf-8')
          old = """    const database = readDatabase();
              const session = database.orderSessions.sessions[input.sessionId];
              if (!session) throw new Error('Order session was not found.');
              assertExpectedSessionRevision(session, input.expectedSessionRevision);
              assertSessionAcceptsContributions(session);
              const participants = database.orderSessions.participants[input.sessionId] ?? [];
          """.replace('              ', '')
          new = """    const database = readDatabase();
              const mutations = database.orderSessions.mutations[input.sessionId] ?? [];
              const appliedMutation =
                mutations.find((candidate) => candidate.id === input.mutationId) ?? null;
              if (appliedMutation) return structuredClone(appliedMutation);
              const session = database.orderSessions.sessions[input.sessionId];
              if (!session) throw new Error('Order session was not found.');
              assertExpectedSessionRevision(session, input.expectedSessionRevision);
              assertSessionAcceptsContributions(session);
              const participants = database.orderSessions.participants[input.sessionId] ?? [];
          """.replace('              ', '')
          if old not in source:
              raise SystemExit('Expected local session mutation prelude was not found.')
          source = source.replace(old, new, 1)
          old_later = """    const contributions = database.orderSessions.contributions[input.sessionId] ?? [];
              const mutations = database.orderSessions.mutations[input.sessionId] ?? [];
              const currentContribution =
                contributions.find((candidate) => candidate.userId === user.id) ?? null;
              const appliedMutation =
                mutations.find((candidate) => candidate.id === input.mutationId) ?? null;
              const result = applySessionContributionMutation(
                { contribution: currentContribution, appliedMutation },
          """.replace('              ', '')
          new_later = """    const contributions = database.orderSessions.contributions[input.sessionId] ?? [];
              const currentContribution =
                contributions.find((candidate) => candidate.userId === user.id) ?? null;
              const result = applySessionContributionMutation(
                { contribution: currentContribution, appliedMutation: null },
          """.replace('              ', '')
          if old_later not in source:
              raise SystemExit('Expected duplicate mutation lookup was not found.')
          gateway_path.write_text(source.replace(old_later, new_later, 1), encoding='utf-8')

          Path('.github/workflows/v170-normalize-branch-once.yml').unlink()
          PY
      - run: npm ci
      - run: npm run format
      - run: npm run lint:fix
      - run: npm run typecheck
      - run: npm run typecheck:tsc
      - run: >-
          npx vitest run
          tests/domain/order-session.test.ts
          tests/domain/session-contribution.test.ts
          tests/services/localOrderSessionService.test.ts
      - run: npm run build
      - name: Commit normalized branch
        shell: bash
        run: |
          if git diff --quiet; then
            echo 'Nothing to normalize.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'refactor(v1.7): normalize session implementation'
          git push origin HEAD:1.7.0
