name: v1.7 One-time Branch Normalization Retry

on:
  push:
    branches: ['1.7.0']
    paths:
      - '.github/workflows/v170-normalize-branch-retry.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: v170-normalize-branch-retry
  cancel-in-progress: false

jobs:
  normalize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
        with:
          ref: 1.7.0
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: 26
          cache: npm
      - name: Normalize session implementation
        shell: bash
        run: |
          python <<'PY'
          from pathlib import Path
          import re

          for obsolete in [
              Path('src/modules/order-sessions/hooks/use-order-session-details.hook.ts'),
              Path('src/modules/order-sessions/types/data-access-compatibility.d.ts'),
              Path('.github/workflows/v170-normalize-branch-once.yml'),
              Path('.github/workflows/v170-normalize-branch-retry.yml'),
          ]:
              obsolete.unlink(missing_ok=True)

          gateway_path = Path('src/modules/data-access/gateways/local-order-session.gateway.ts')
          source = gateway_path.read_text(encoding='utf-8')

          prelude_pattern = re.compile(
              r"(?P<indent>\s{4})const database = readDatabase\(\);\n"
              r"(?P=indent)const session = database\.orderSessions\.sessions\[input\.sessionId\];\n"
              r"(?P=indent)if \(!session\) throw new Error\('Order session was not found\.'\);\n"
              r"(?P=indent)assertExpectedSessionRevision\(session, input\.expectedSessionRevision\);\n"
              r"(?P=indent)assertSessionAcceptsContributions\(session\);\n"
              r"(?P=indent)const participants = database\.orderSessions\.participants\[input\.sessionId\] \?\? \[\];"
          )
          prelude_replacement = """    const database = readDatabase();
              const mutations = database.orderSessions.mutations[input.sessionId] ?? [];
              const appliedMutation =
                mutations.find((candidate) => candidate.id === input.mutationId) ?? null;
              if (appliedMutation) return structuredClone(appliedMutation);
              const session = database.orderSessions.sessions[input.sessionId];
              if (!session) throw new Error('Order session was not found.');
              assertExpectedSessionRevision(session, input.expectedSessionRevision);
              assertSessionAcceptsContributions(session);
              const participants = database.orderSessions.participants[input.sessionId] ?? [];
          """
          prelude_replacement = '\n'.join(
              line[10:] if line.startswith('          ') else line
              for line in prelude_replacement.splitlines()
          ).rstrip()
          source, count = prelude_pattern.subn(prelude_replacement, source, count=1)
          if count != 1:
              raise SystemExit(f'Expected one session mutation prelude; found {count}.')

          duplicate_pattern = re.compile(
              r"(?P<indent>\s{4})const contributions = database\.orderSessions\.contributions\[input\.sessionId\] \?\? \[\];\n"
              r"(?P=indent)const mutations = database\.orderSessions\.mutations\[input\.sessionId\] \?\? \[\];\n"
              r"(?P=indent)const currentContribution =\n"
              r"(?P=indent)  contributions\.find\(\(candidate\) => candidate\.userId === user\.id\) \?\? null;\n"
              r"(?P=indent)const appliedMutation =\n"
              r"(?P=indent)  mutations\.find\(\(candidate\) => candidate\.id === input\.mutationId\) \?\? null;\n"
              r"(?P=indent)const result = applySessionContributionMutation\(\n"
              r"(?P=indent)  \{ contribution: currentContribution, appliedMutation \},"
          )
          duplicate_replacement = """    const contributions = database.orderSessions.contributions[input.sessionId] ?? [];
              const currentContribution =
                contributions.find((candidate) => candidate.userId === user.id) ?? null;
              const result = applySessionContributionMutation(
                { contribution: currentContribution, appliedMutation: null },
          """
          duplicate_replacement = '\n'.join(
              line[10:] if line.startswith('          ') else line
              for line in duplicate_replacement.splitlines()
          ).rstrip()
          source, count = duplicate_pattern.subn(duplicate_replacement, source, count=1)
          if count != 1:
              raise SystemExit(f'Expected one duplicate mutation lookup; found {count}.')

          gateway_path.write_text(source, encoding='utf-8')
          PY
      - run: npm ci
      - run: npm run format
      - run: npm run lint:fix
      - run: npm run typecheck
      - run: npm run typecheck:tsc
      - run: >-
          npx vitest run
          tests/domain/order-session.test.ts
          tests/domain/session-contribution.test.ts
          tests/services/localOrderSessionService.test.ts
      - run: npm run build
      - name: Commit normalized branch
        shell: bash
        run: |
          if git diff --quiet; then
            echo 'Nothing to normalize.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'refactor(v1.7): normalize session implementation'
          git push origin HEAD:1.7.0
