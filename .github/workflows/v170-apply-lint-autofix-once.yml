name: v1.7 Final Repair Validation

on:
  push:
    branches: [1.7.0]
    paths:
      - '.github/workflows/v170-apply-lint-autofix-once.yml'
      - '.github/automation/apply-v170-gate-fixes.part4'

permissions:
  contents: write

concurrency:
  group: v170-final-repair-push-${{ github.sha }}
  cancel-in-progress: false

jobs:
  validate-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v7
        with:
          ref: 1.7.0
          fetch-depth: 0
      - name: Capture branch head
        shell: bash
        run: echo "ORIGINAL_HEAD=$(git rev-parse HEAD)" >> "${GITHUB_ENV}"
      - uses: actions/setup-node@v6
        with:
          node-version: 26
          cache: npm
          cache-dependency-path: |
            package-lock.json
            functions/package-lock.json
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - run: npm ci
      - run: npm --prefix functions ci
      - name: Apply canonical grouped repairs
        shell: bash
        run: |
          set -euo pipefail
          npm run lint:fix || true
          cat \
            .github/automation/apply-v170-gate-fixes.part1 \
            .github/automation/apply-v170-gate-fixes.part2 \
            .github/automation/apply-v170-gate-fixes.part3 \
            .github/automation/apply-v170-gate-fixes.part4 \
            > "${RUNNER_TEMP}/apply-v170-gate-fixes.py"
          python "${RUNNER_TEMP}/apply-v170-gate-fixes.py"
          rm -rf .github/automation
          rm .github/workflows/v170-apply-lint-autofix-once.yml
          npm run format
          npm run knowledge:build
          npm run lint:fix
      - name: Resolve main version for PR integrity
        shell: bash
        run: |
          git fetch --no-tags origin main
          git show origin/main:package.json > "${RUNNER_TEMP}/base-package.json"
          echo "BASE_VERSION=$(node -p "require('${RUNNER_TEMP}/base-package.json').version")" >> "${GITHUB_ENV}"
          echo 'GITHUB_EVENT_NAME=pull_request' >> "${GITHUB_ENV}"
      - name: Run complete release ladder
        shell: bash
        run: |
          set -euo pipefail
          npm run knowledge:validate
          npm run format:check
          git diff --check
          npm run lint
          npm run typecheck
          npm run typecheck:tsc
          npm run functions:validate
          npm run test
          npm run test:coverage
          npm run test:rules
          npm run quality:dead-code
          npm run quality:circular
          npm run quality:release
          npm run quality:agent-docs
          npm run security:audit
          npm --prefix functions audit --audit-level=high
          npm run build
      - name: Verify local-mode production preview
        env:
          VITE_FORCE_LOCAL_MODE: 'true'
        shell: bash
        run: |
          set -euo pipefail
          npm run build
          npm run preview -- --host 127.0.0.1 > "${RUNNER_TEMP}/preview.log" 2>&1 &
          PREVIEW_PID=$!
          trap 'kill ${PREVIEW_PID} 2>/dev/null || true' EXIT
          for attempt in {1..30}; do
            if curl --fail --silent http://127.0.0.1:4173/ > /dev/null; then
              exit 0
            fi
            sleep 1
          done
          cat "${RUNNER_TEMP}/preview.log"
          exit 1
      - name: Run critical browser journey
        shell: bash
        run: |
          set -euo pipefail
          npx playwright install --with-deps chromium
          npm run test:e2e:critical
      - name: Publish one squashed repair commit
        shell: bash
        run: |
          set -euo pipefail
          CLEAN_PARENT=$(git rev-parse 8df8bee99cf011361fa21c76b5ab4c3c0201a234^)
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git reset --soft "${CLEAN_PARENT}"
          git commit -m 'fix(v1.7): restore runtime and satisfy release gates'
          git push origin HEAD:refs/heads/1.7.0 \
            --force-with-lease=refs/heads/1.7.0:${ORIGINAL_HEAD}
