name: v1.7 Apply Lint Autofix Once

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/v170-apply-lint-autofix-once.yml'

permissions:
  contents: write

concurrency:
  group: v170-apply-lint-autofix-once
  cancel-in-progress: false

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
        with:
          ref: 1.7.0
          fetch-depth: 2
      - uses: actions/setup-node@v6
        with:
          node-version: 26
          cache: npm
          cache-dependency-path: |
            package-lock.json
            functions/package-lock.json
      - run: npm ci
      - run: npm --prefix functions ci
      - name: Apply repository-owned autofixes
        run: npm run lint:fix || true
      - name: Commit one bulk autofix batch
        shell: bash
        run: |
          set -euo pipefail
          rm .github/workflows/v170-apply-lint-autofix-once.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'fix(quality): apply canonical lint autofixes'
          git push origin HEAD:1.7.0
