name: v1.7 Critical Browser Diagnostics

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/v170-apply-lint-autofix-once.yml'

permissions:
  contents: read

concurrency:
  group: v170-critical-browser-diagnostics
  cancel-in-progress: false

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v7
        with:
          ref: 1.7.0
      - uses: actions/setup-node@v6
        with:
          node-version: 26
          cache: npm
          cache-dependency-path: |
            package-lock.json
            functions/package-lock.json
      - run: npm ci
      - run: npm --prefix functions ci
      - name: Apply repaired source tree
        shell: bash
        run: |
          set -o pipefail
          npm run lint:fix 2>&1 | tee diagnostic-lint-fix.log || true
          cat \
            .github/automation/apply-v170-gate-fixes.part1 \
            .github/automation/apply-v170-gate-fixes.part2 \
            .github/automation/apply-v170-gate-fixes.part3 \
            > "${RUNNER_TEMP}/apply-v170-gate-fixes.py"
          python "${RUNNER_TEMP}/apply-v170-gate-fixes.py" 2>&1 | tee diagnostic-apply.log
          rm -rf .github/automation
          rm .github/workflows/v170-apply-lint-autofix-once.yml
          npm run format 2>&1 | tee diagnostic-format.log
          npm run lint:fix 2>&1 | tee diagnostic-final-lint.log
      - name: Run critical browser journey with trace
        shell: bash
        run: |
          set -o pipefail
          npx playwright install --with-deps chromium
          npm run test:e2e:critical 2>&1 | tee gate-critical-e2e.log
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: v170-critical-browser-diagnostics
          path: |
            diagnostic-*.log
            gate-critical-e2e.log
            playwright-report/
            test-results/
          if-no-files-found: warn
          retention-days: 7
