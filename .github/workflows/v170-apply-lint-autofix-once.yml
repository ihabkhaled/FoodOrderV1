name: v1.7 Export Autofixed Source

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/v170-apply-lint-autofix-once.yml'

permissions:
  contents: read

concurrency:
  group: v170-export-autofixed-source
  cancel-in-progress: false

jobs:
  export:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
        with:
          ref: 1.7.0
      - uses: actions/setup-node@v6
        with:
          node-version: 26
          cache: npm
          cache-dependency-path: |
            package-lock.json
            functions/package-lock.json
      - run: npm ci
      - run: npm --prefix functions ci
      - name: Apply repository-owned autofixes
        run: npm run lint:fix || true
      - name: Remove transfer-only workflow from exported tree
        run: rm .github/workflows/v170-apply-lint-autofix-once.yml
      - name: Package complete source tree
        shell: bash
        run: |
          zip -qr "${RUNNER_TEMP}/FoodOrderV1-v170-autofixed.zip" . \
            -x '.git/*' 'node_modules/*' 'functions/node_modules/*' 'dist/*' 'coverage/*' \
               'playwright-report/*' 'test-results/*'
      - uses: actions/upload-artifact@v7
        with:
          name: FoodOrderV1-v170-autofixed-source
          path: ${{ runner.temp }}/FoodOrderV1-v170-autofixed.zip
          if-no-files-found: error
          retention-days: 7
