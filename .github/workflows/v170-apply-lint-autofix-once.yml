name: v1.7 Final Repair Validation

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/v170-apply-lint-autofix-once.yml'

permissions:
  contents: write

concurrency:
  group: v170-final-repair-validation
  cancel-in-progress: false

jobs:
  validate-and-export:
    runs-on: ubuntu-latest
    timeout-minutes: 100
    steps:
      - uses: actions/checkout@v7
        with:
          ref: 1.7.0
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: 26
          cache: npm
          cache-dependency-path: |
            package-lock.json
            functions/package-lock.json
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - run: npm ci
      - run: npm --prefix functions ci
      - name: Apply canonical and grouped repairs
        shell: bash
        run: |
          set -euo pipefail
          npm run lint:fix || true
          cat \
            .github/automation/apply-v170-gate-fixes.part1 \
            .github/automation/apply-v170-gate-fixes.part2 \
            .github/automation/apply-v170-gate-fixes.part3 \
            .github/automation/apply-v170-gate-fixes.part4 \
            > "${RUNNER_TEMP}/apply-v170-gate-fixes.py"
          python "${RUNNER_TEMP}/apply-v170-gate-fixes.py"
          rm -rf .github/automation
          rm .github/workflows/v170-apply-lint-autofix-once.yml
          npm run format
          npm run knowledge:build
          npm run lint:fix
      - name: Resolve main version for PR integrity
        shell: bash
        run: |
          git fetch --no-tags origin main
          git show origin/main:package.json > "${RUNNER_TEMP}/base-package.json"
          echo "BASE_VERSION=$(node -p "require('${RUNNER_TEMP}/base-package.json').version")" >> "${GITHUB_ENV}"
          echo 'GITHUB_EVENT_NAME=pull_request' >> "${GITHUB_ENV}"
      - name: Run complete non-browser release ladder
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          {
            npm run knowledge:validate
            npm run format:check
            git diff --check
            npm run lint
            npm run typecheck
            npm run typecheck:tsc
            npm run functions:validate
            npm run test
            npm run test:coverage
            npm run test:rules
            npm run quality:dead-code
            npm run quality:circular
            npm run quality:release
            npm run quality:agent-docs
            npm run security:audit
            npm --prefix functions audit --audit-level=high
            npm run build
          } 2>&1 | tee "${RUNNER_TEMP}/release-ladder.log"
      - name: Verify forced local-mode build and preview
        continue-on-error: true
        shell: bash
        env:
          VITE_FORCE_LOCAL_MODE: 'true'
        run: |
          set -o pipefail
          npm run build 2>&1 | tee "${RUNNER_TEMP}/local-build.log"
          npm run preview -- --host 127.0.0.1 > "${RUNNER_TEMP}/preview.log" 2>&1 &
          PREVIEW_PID=$!
          trap 'kill ${PREVIEW_PID} 2>/dev/null || true' EXIT
          for attempt in {1..30}; do
            if curl --fail --silent http://127.0.0.1:4173/ > /dev/null; then
              exit 0
            fi
            sleep 1
          done
          cat "${RUNNER_TEMP}/preview.log"
          exit 1
      - name: Run critical browser journey
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          npx playwright install --with-deps chromium
          npm run test:e2e:critical 2>&1 | tee "${RUNNER_TEMP}/critical-e2e.log"
      - name: Create repair transport commit
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'fix(v1.7): restore runtime and release gates'
          git push origin HEAD:refs/heads/automation/v170-gate-fixes --force
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: v170-final-repair-diagnostics
          path: |
            ${{ runner.temp }}/release-ladder.log
            ${{ runner.temp }}/local-build.log
            ${{ runner.temp }}/preview.log
            ${{ runner.temp }}/critical-e2e.log
            playwright-report/
            test-results/
          if-no-files-found: warn
          retention-days: 7
