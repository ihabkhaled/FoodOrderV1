name: One-shot Functions Bootstrap

on:
  push:
    branches: [agent/foodorder-v1.3-complete]
    paths:
      - .github/workflows/one-shot-functions-bootstrap.yml

permissions:
  contents: write

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
        with:
          ref: agent/foodorder-v1.3-complete
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: functions/package.json

      - name: Apply exact compatibility fixes
        run: |
          node <<'NODE'
          const { readFileSync, writeFileSync } = require('node:fs');

          const replace = (path, from, to) => {
            const original = readFileSync(path, 'utf8');
            if (!original.includes(from)) {
              throw new Error(`Expected text not found in ${path}: ${from}`);
            }
            writeFileSync(path, original.replace(from, to));
          };

          replace(
            'src/components/BucketCollaborateContent.tsx',
            "  const groupTranslate = (key: Parameters<typeof translateGroupOrder>[1]) =>\n    translateGroupOrder(locale, key);\n",
            '',
          );
          replace(
            'src/components/BucketPricingPanel.tsx',
            '  policy?: BucketPricingPolicy;',
            '  policy: BucketPricingPolicy | undefined;',
          );
          replace(
            'src/pages/BucketSharePage.tsx',
            '            currentUserId={user.id}',
            '            currentUserId={user?.id ?? bucket.ownerId}',
          );
          replace(
            'firestore.rules',
            "          && request.resource.data.frozenAt is string || request.resource.data.frozenAt == null\n          && request.resource.data.frozenBy is string || request.resource.data.frozenBy == null",
            "          && (request.resource.data.frozenAt is string\n            || request.resource.data.frozenAt == null)\n          && (request.resource.data.frozenBy is string\n            || request.resource.data.frozenBy == null)",
          );

          const firebasePath = 'firebase.json';
          const firebase = JSON.parse(readFileSync(firebasePath, 'utf8'));
          firebase.functions = {
            source: 'functions',
            runtime: 'nodejs22',
            predeploy: [
              'npm --prefix functions ci',
              'npm --prefix functions run build',
            ],
          };
          writeFileSync(firebasePath, `${JSON.stringify(firebase, null, 2)}\n`);
          NODE

      - name: Generate deterministic Functions lockfile
        run: npm --prefix functions install --package-lock-only --ignore-scripts

      - name: Remove one-shot workflow and commit generated result
        run: |
          rm .github/workflows/one-shot-functions-bootstrap.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/components/BucketCollaborateContent.tsx \
            src/components/BucketPricingPanel.tsx \
            src/pages/BucketSharePage.tsx \
            firestore.rules firebase.json functions/package-lock.json \
            .github/workflows/one-shot-functions-bootstrap.yml
          git commit -m "chore(functions): bootstrap deterministic trusted runtime"
          git push origin HEAD:agent/foodorder-v1.3-complete
