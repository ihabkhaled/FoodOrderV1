name: CI
on:
  pull_request:
  push:
    branches: [main]
permissions:
  contents: read
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true
jobs:
  # Fast, independent quality gates.
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 26
          cache: npm
      - run: npm ci
      - run: npm run knowledge:build
      - run: npm run knowledge:validate
      - run: npm run format:check
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run typecheck:tsc
      - run: npm run quality:circular
      - run: npm run test:coverage
      - run: npm run build
      - run: npm run knowledge:benchmark
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: validation-reports
          path: |
            coverage/
            .ai/reports/

  # End-to-end (unit + integration run in the quality job's coverage step).
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 26
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
      - uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/

  # Security scans (advisory: report findings without blocking the build).
  security:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 26
          cache: npm
      - run: npm ci
      - name: npm audit (high+)
        run: npm run security:audit || true
      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scanners: vuln,secret,misconfig
          skip-dirs: node_modules,dist,coverage,android,ios,ui-shots
          exit-code: '0'
