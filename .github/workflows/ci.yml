name: CI
on:
  pull_request:
  push:
    branches: [main]
permissions:
  contents: read
jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 26
      - run: npm install
      - run: npm run knowledge:build
      - run: npm run knowledge:validate
      - run: npm run format:check
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test:coverage
      - run: npm run build
      - run: npm run knowledge:benchmark
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: validation-reports
          path: |
            coverage/
            .ai/reports/
