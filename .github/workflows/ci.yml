name: CI

on:
  pull_request:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  knowledge:
    name: Knowledge
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 26
          cache: npm
      - run: npm ci
      - run: npm run knowledge:build
      - run: npm run knowledge:validate
      - run: npm run knowledge:benchmark
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: knowledge-reports
          path: .ai/reports/
          if-no-files-found: error

  format:
    name: Format
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 26
          cache: npm
      - run: npm ci
      - run: npm run format:check

  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 26
          cache: npm
          cache-dependency-path: |
            package-lock.json
            functions/package-lock.json
      - run: npm ci
      - run: npm --prefix functions ci
      - name: Run ESLint autofix
        run: npm run lint:fix
      - name: Require committed autofixes
        run: git diff --exit-code
      - name: Run clean ESLint gate
        shell: bash
        run: |
          set -o pipefail
          npm run lint 2>&1 | tee eslint.log
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: eslint-report
          path: eslint.log
          if-no-files-found: error

  typecheck-primary:
    name: Typecheck Primary
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 26
          cache: npm
      - run: npm ci
      - run: npm run typecheck

  typecheck-compatibility:
    name: Typecheck Compatibility
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 26
          cache: npm
      - run: npm ci
      - run: npm run typecheck:tsc

  functions:
    name: Firebase Functions
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: functions/package-lock.json
      - run: npm --prefix functions ci
      - run: npm --prefix functions run typecheck
      - run: npm --prefix functions run build
      - run: npm --prefix functions run test
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: firebase-functions-build
          path: functions/lib/
          if-no-files-found: error

  release-integrity:
    name: Release Version Integrity
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 26
      - name: Resolve base version for pull requests
        if: github.event_name == 'pull_request'
        shell: bash
        run: |
          git fetch --no-tags --depth=1 origin "${GITHUB_BASE_REF}"
          git show "origin/${GITHUB_BASE_REF}:package.json" > "${RUNNER_TEMP}/base-package.json"
          BASE_VERSION="$(node -p "require('${RUNNER_TEMP}/base-package.json').version")"
          echo "BASE_VERSION=${BASE_VERSION}" >> "${GITHUB_ENV}"
          echo "Base (${GITHUB_BASE_REF}) version: ${BASE_VERSION}"
      - name: Verify release version integrity and PR bump
        run: npm run quality:release

  governance:
    name: Governance and Agent Docs
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 26
      - run: npm run quality:agent-docs

  firestore-rules:
    name: Firebase Emulator and Security Rules
    uses: ./.github/workflows/_firebase-emulator.yml
    permissions:
      contents: read

  circular-dependencies:
    name: Circular Dependencies
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 26
          cache: npm
      - run: npm ci
      - run: npm run quality:circular

  dead-code:
    name: Dead Code
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 26
          cache: npm
      - run: npm ci
      - name: Run Knip
        shell: bash
        run: |
          set -o pipefail
          npm run quality:dead-code 2>&1 | tee knip.log
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: dead-code-report
          path: knip.log
          if-no-files-found: error

  coverage:
    name: Unit and Integration Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 18
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 26
          cache: npm
      - run: npm ci
      - name: Run coverage
        shell: bash
        run: |
          set -o pipefail
          npm run test:coverage 2>&1 | tee coverage.log
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage-report
          path: |
            coverage.log
            coverage/
          if-no-files-found: warn

  build:
    name: Production Build
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 26
          cache: npm
      - run: npm ci
      - name: Build production application
        run: npm run build

  e2e:
    name: End-to-End
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 26
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
      - uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          if-no-files-found: warn

  critical-e2e:
    name: Critical Group-Order End-to-End
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 26
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e:critical
      - uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: critical-playwright-report
          path: playwright-report/
          if-no-files-found: warn

  npm-audit:
    name: npm Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 26
          cache: npm
      - run: npm ci
      - run: npm run security:audit
      - run: npm --prefix functions audit --audit-level=high

  trivy:
    name: Trivy
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - name: Trivy filesystem report
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret,misconfig
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: '1'
          skip-dirs: node_modules,dist,coverage,android,ios,ui-shots
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: trivy-results
          path: trivy-results.sarif
          if-no-files-found: error
      - name: Enforce Trivy high and critical findings
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret,misconfig
          format: table
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: '1'
          skip-setup-trivy: true
          skip-dirs: node_modules,dist,coverage,android,ios,ui-shots

  all-gates-green:
    name: All Gates Green
    if: always()
    needs:
      - knowledge
      - format
      - lint
      - typecheck-primary
      - typecheck-compatibility
      - functions
      - release-integrity
      - governance
      - firestore-rules
      - circular-dependencies
      - dead-code
      - coverage
      - build
      - e2e
      - critical-e2e
      - npm-audit
      - trivy
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Require every repository gate to succeed
        env:
          NEEDS_JSON: ${{ toJson(needs) }}
        run: |
          node <<'NODE'
          const needs = JSON.parse(process.env.NEEDS_JSON ?? '{}');
          const failures = Object.entries(needs).filter(([, value]) => value.result !== 'success');
          if (failures.length > 0) {
            console.error('Required gates are not green:');
            for (const [name, value] of failures) console.error(`- ${name}: ${value.result}`);
            process.exit(1);
          }
          console.log('All mandatory repository gates are green.');
          NODE

  firebase-deploy:
    name: Firebase Deployment Gate
    needs: all-gates-green
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      FIREBASE_PROJECT_ID: foodorder-c997c
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 26
          cache: npm
          cache-dependency-path: |
            package-lock.json
            functions/package-lock.json
      - run: npm ci
      - run: npm --prefix functions ci
      - name: Revalidate release and callable package
        run: |
          npm run quality:release
          npm run functions:validate
      - name: Prepare Firebase credentials
        if: github.event_name != 'pull_request'
        shell: bash
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          FIREBASE_SERVICE_ACCOUNT_BASE64: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_BASE64 }}
          GOOGLE_APPLICATION_CREDENTIALS_JSON: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS_JSON }}
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
          FIREBASE_CI_TOKEN: ${{ secrets.FIREBASE_CI_TOKEN }}
        run: |
          set -euo pipefail
          credentials="${FIREBASE_SERVICE_ACCOUNT:-${FIREBASE_SERVICE_ACCOUNT_JSON:-${GOOGLE_APPLICATION_CREDENTIALS_JSON:-${GCP_SA_KEY:-}}}}"
          token="${FIREBASE_TOKEN:-${FIREBASE_CI_TOKEN:-}}"
          if [[ -n "${FIREBASE_SERVICE_ACCOUNT_BASE64:-}" ]]; then
            echo "::add-mask::${FIREBASE_SERVICE_ACCOUNT_BASE64}"
            printf '%s' "${FIREBASE_SERVICE_ACCOUNT_BASE64}" | base64 --decode > "${RUNNER_TEMP}/firebase-service-account.json"
            echo "GOOGLE_APPLICATION_CREDENTIALS=${RUNNER_TEMP}/firebase-service-account.json" >> "${GITHUB_ENV}"
          elif [[ -n "${credentials}" ]]; then
            echo "::add-mask::${credentials}"
            printf '%s' "${credentials}" > "${RUNNER_TEMP}/firebase-service-account.json"
            echo "GOOGLE_APPLICATION_CREDENTIALS=${RUNNER_TEMP}/firebase-service-account.json" >> "${GITHUB_ENV}"
          elif [[ -n "${token}" ]]; then
            echo "::add-mask::${token}"
            echo "FIREBASE_DEPLOY_TOKEN=${token}" >> "${GITHUB_ENV}"
          else
            echo "::error::Firebase deployment credentials are required before APK generation and release."
            exit 1
          fi
      - name: Deploy Firebase Functions (batched) and Firestore rules
        if: github.event_name != 'pull_request'
        shell: bash
        env:
          # Deploy in small batches so concurrent Cloud Run healthchecks stay
          # under the regional CPU quota. See scripts/deploy-functions-batched.mjs
          # and docs/operations/functions-deploy-blockers.md.
          FUNCTIONS_DEPLOY_BATCH_SIZE: '4'
          FUNCTIONS_DEPLOY_PAUSE_MS: '20000'
          FUNCTIONS_DEPLOY_RETRIES: '2'
        run: npm run functions:deploy:batched 2>&1 | tee firebase-deploy.log
      - name: Smoke-test deployed v1.3.3 callables
        if: github.event_name != 'pull_request'
        shell: bash
        run: |
          set -euo pipefail
          for callable in \
            finalizeGroupOrderV132 \
            addCustomBucketItemV132 \
            approveCustomBucketItemV132 \
            repeatGroupOrderV133 \
            transitionGroupOrderV133
          do
            endpoint="https://europe-west1-${FIREBASE_PROJECT_ID}.cloudfunctions.net/${callable}"
            response_file="${RUNNER_TEMP}/${callable}.json"
            status="$(curl --silent --show-error \
              --output "${response_file}" \
              --write-out '%{http_code}' \
              --request POST \
              --header 'Content-Type: application/json' \
              --data '{"data":{}}' \
              "${endpoint}")"
            if [[ "${status}" == "404" || "${status}" -ge 500 ]]; then
              cat "${response_file}"
              echo "::error::${callable} deployment smoke test returned HTTP ${status}."
              exit 1
            fi
            if ! grep --ignore-case --quiet 'UNAUTHENTICATED' "${response_file}"; then
              cat "${response_file}"
              echo "::error::${callable} did not return the expected authentication boundary."
              exit 1
            fi
          done
      - name: Confirm pull-request deployment preflight
        if: github.event_name == 'pull_request'
        run: echo "Firebase callable build, tests, and release integrity passed. Production deployment is reserved for main."

  generate-apk:
    name: Generate APK
    # The APK is a web/Capacitor build and does not depend on the Firebase
    # Functions deploy. Gate it on the quality gates only, so a Functions
    # deploy blocked by a GCP CPU quota (an owner-side action) cannot stop the
    # APK from being generated and released. See docs/operations/functions-deploy-blockers.md.
    needs: all-gates-green
    uses: ./.github/workflows/android-apk.yml
    permissions:
      contents: read

  release-apk:
    name: Release APK
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    needs: generate-apk
    runs-on: ubuntu-latest
    timeout-minutes: 12
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 26
      - name: Resolve release tag
        id: release
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            release_tag="${GITHUB_REF_NAME}"
          else
            release_tag="v${{ needs.generate-apk.outputs.build_version }}"
          fi
          echo "tag=${release_tag}" >> "${GITHUB_OUTPUT}"
      - name: Download generated APK
        uses: actions/download-artifact@v4
        with:
          name: FoodOrderV1-debug-apk
      - name: Verify APK checksum
        run: sha256sum --check FoodOrderV1-*-debug.apk.sha256
      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
        run: |
          gh release view "${RELEASE_TAG}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1 || \
            gh release create "${RELEASE_TAG}" --repo "${GITHUB_REPOSITORY}" \
              --target "${GITHUB_SHA}" --generate-notes
          gh release upload "${RELEASE_TAG}" FoodOrderV1-*-debug.apk FoodOrderV1-*-debug.apk.sha256 \
            --repo "${GITHUB_REPOSITORY}" --clobber
