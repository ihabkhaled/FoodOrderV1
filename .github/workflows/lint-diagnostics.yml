name: Lint Autofix Diagnostics

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint-autofix-diagnostics:
    name: Lint Autofix Diagnostics
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 26
          cache: npm
          cache-dependency-path: |
            package-lock.json
            functions/package-lock.json
      - run: npm ci
      - run: (cd functions && npm ci --ignore-scripts)
      - name: Run autofix and capture all diagnostics
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          npm run lint:fix 2>&1 | tee lint-autofix.log
      - name: Capture autofix patch
        shell: bash
        run: git diff --binary > lint-autofix.patch
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: lint-autofix-diagnostics
          path: |
            lint-autofix.log
            lint-autofix.patch
          if-no-files-found: error
      - name: Require committed lint-clean state
        run: |
          git diff --exit-code
          npm run lint
