name: One-shot React Virtuoso Dependency

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/one-shot-virtuoso-dependency.yml

permissions:
  contents: read

concurrency:
  group: one-shot-virtuoso-${{ github.event.pull_request.head.ref }}
  cancel-in-progress: true

jobs:
  install:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.ref }}
      - uses: actions/setup-node@v6
        with:
          node-version: 26
          cache: npm
      - run: npm ci
      - name: Install latest stable React Virtuoso
        run: npm install --save-exact react-virtuoso@latest
      - name: Audit dependency graph
        run: npm audit --audit-level=high
      - name: Export deterministic package files
        uses: actions/upload-artifact@v7
        with:
          name: react-virtuoso-package-files
          path: |
            package.json
            package-lock.json
          if-no-files-found: error
          retention-days: 7
