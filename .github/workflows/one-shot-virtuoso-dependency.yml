name: One-shot React Virtuoso Dependency

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/one-shot-virtuoso-dependency.yml

permissions:
  contents: write

jobs:
  install:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: 26
          cache: npm
      - run: npm ci
      - name: Install latest stable React Virtuoso
        run: npm install --save-exact react-virtuoso@latest
      - name: Apply and verify lint fixes
        run: |
          npm run lint:fix
          npm run lint
      - name: Run both TypeScript gates
        run: |
          npm run typecheck
          npm run typecheck:tsc
      - name: Build production application
        run: npm run build
      - name: Audit dependency graph
        run: npm audit --audit-level=high
      - name: Remove temporary workflow and commit
        run: |
          rm .github/workflows/one-shot-virtuoso-dependency.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json .github/workflows/one-shot-virtuoso-dependency.yml
          git diff --cached --check
          git commit -m "feat(ui): add React Virtuoso virtualization"
          git pull --rebase origin "${{ github.event.pull_request.head.ref }}"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
