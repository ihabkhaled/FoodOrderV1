name: One-shot React Virtuoso Dependency

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/one-shot-virtuoso-dependency.yml

permissions:
  contents: write

concurrency:
  group: one-shot-virtuoso-${{ github.event.pull_request.head.ref }}
  cancel-in-progress: true

jobs:
  install:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: 26
          cache: npm
      - name: Synchronize exact latest branch
        run: |
          git fetch origin "${{ github.event.pull_request.head.ref }}"
          git reset --hard "origin/${{ github.event.pull_request.head.ref }}"
      - run: npm ci
      - name: Install audited React Virtuoso release
        run: npm install --save-exact react-virtuoso@4.18.10
      - name: Audit dependency graph
        run: npm audit --audit-level=high
      - name: Remove temporary workflow and commit generated lockfile
        env:
          HUSKY: '0'
        run: |
          rm .github/workflows/one-shot-virtuoso-dependency.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json .github/workflows/one-shot-virtuoso-dependency.yml
          git diff --cached --check
          git commit -m "feat(ui): add React Virtuoso virtualization"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
