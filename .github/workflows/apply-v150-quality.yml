name: Apply v1.5.0 Quality Fixes

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: apply-v150-quality-${{ github.head_ref || github.ref }}
  cancel-in-progress: false

jobs:
  apply-quality-fixes:
    name: Apply and Validate Quality Fixes
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: 26
          cache: npm
          cache-dependency-path: |
            package-lock.json
            functions/package-lock.json
      - run: npm ci
      - run: npm --prefix functions ci
      - name: Apply deterministic ESLint fixes
        shell: bash
        run: |
          set +e
          npm run lint:fix
          set -e
      - name: Apply reviewed manual quality corrections
        shell: bash
        run: |
          python3 <<'PY'
          from pathlib import Path

          def replace(path: str, old: str, new: str) -> None:
              target = Path(path)
              content = target.read_text()
              if old not in content:
                  raise SystemExit(f'Expected source block was not found in {path}')
              target.write_text(content.replace(old, new, 1))

          replace(
              'src/components/NotificationCenter.tsx',
              '    navigate(notification.route);',
              '    void navigate(notification.route);',
          )

          replace(
              'src/pages/SocialPage.tsx',
              "  const availableFriends = (group: FriendGroup): SocialUser[] =>\n",
              "  const removeMember = async (\n"
              "    groupId: string,\n"
              "    memberId: string,\n"
              "  ): Promise<void> => {\n"
              "    await run(\n"
              "      () => socialService.removeGroupMember(groupId, memberId),\n"
              "      s('memberRemoved'),\n"
              "    );\n"
              "  };\n\n"
              "  const availableFriends = (group: FriendGroup): SocialUser[] =>\n",
          )
          replace(
              'src/pages/SocialPage.tsx',
              "                                  void run(\n"
              "                                    () =>\n"
              "                                      socialService.removeGroupMember(\n"
              "                                        group.id,\n"
              "                                        member.userId,\n"
              "                                      ),\n"
              "                                    s('memberRemoved'),\n"
              "                                  )",
              "                                  void removeMember(group.id, member.userId)",
          )

          replace(
              'src/services/localSocialManagementService.ts',
              "    members[index] = {\n"
              "      ...member,\n"
              "      status: accessSources.length === 0 ? 'revoked' : member.status,\n"
              "      accessSources,\n"
              "      updatedAt: new Date().toISOString(),\n"
              "    } as MemberWithSources;",
              "    const rolePriority = { viewer: 1, contributor: 2, editor: 3 } as const;\n"
              "    const remainingRole = socialDatabase.grants\n"
              "      .filter((candidate) => accessSources.includes(candidate.id))\n"
              "      .reduce<BucketAccessGrant['role'] | null>((strongest, candidate) => {\n"
              "        if (!strongest) return candidate.role;\n"
              "        return rolePriority[candidate.role] > rolePriority[strongest]\n"
              "          ? candidate.role\n"
              "          : strongest;\n"
              "      }, null);\n"
              "    members[index] = {\n"
              "      ...member,\n"
              "      role: remainingRole ?? member.role,\n"
              "      status: remainingRole ? 'active' : 'revoked',\n"
              "      canCreateCustomItems: remainingRole === 'editor',\n"
              "      canSetCustomItemPrice: remainingRole === 'editor',\n"
              "      accessSources,\n"
              "      updatedAt: new Date().toISOString(),\n"
              "    } as MemberWithSources;",
          )
          replace(
              'src/services/localSocialManagementService.ts',
              '  async unfriend(friendId: string): Promise<void> {',
              '  unfriend(friendId: string): Promise<void> {',
          )
          replace(
              'src/services/localSocialManagementService.ts',
              "    });\n  }\n\n  override async inviteFriendToGroup(",
              "    });\n    return Promise.resolve();\n  }\n\n  override async inviteFriendToGroup(",
          )

          replace(
              'tests/e2e/social-management.spec.ts',
              "    const aliceMembership = await page.evaluate((databaseKey) => {\n"
              "      const database = JSON.parse(localStorage.getItem(databaseKey) ?? '{}');\n"
              "      return database.sharing.members['bucket-social'].find(\n"
              "        (member: { userId: string }) => member.userId === 'alice-1',\n"
              "      );\n"
              "    }, DATABASE_KEY);\n"
              "    expect(aliceMembership.status).toBe('active');\n"
              "    expect(aliceMembership.role).toBe('editor');",
              "    const aliceMembership = await page.evaluate<\n"
              "      { status: string; role: string; accessSources: string[] },\n"
              "      string\n"
              "    >((databaseKey) => {\n"
              "      const raw = localStorage.getItem(databaseKey);\n"
              "      if (!raw) throw new Error('Local database was not found.');\n"
              "      const database = JSON.parse(raw) as {\n"
              "        sharing: {\n"
              "          members: Record<\n"
              "            string,\n"
              "            Array<{\n"
              "              userId: string;\n"
              "              status: string;\n"
              "              role: string;\n"
              "              accessSources: string[];\n"
              "            }>\n"
              "          >;\n"
              "        };\n"
              "      };\n"
              "      const membership = database.sharing.members['bucket-social']?.find(\n"
              "        (member) => member.userId === 'alice-1',\n"
              "      );\n"
              "      if (!membership) throw new Error('Alice membership was not found.');\n"
              "      return membership;\n"
              "    }, DATABASE_KEY);\n"
              "    expect(aliceMembership.status).toBe('active');\n"
              "    expect(aliceMembership.role).toBe('viewer');",
          )
          PY
      - name: Validate corrected source
        run: |
          npm run lint
          npm run typecheck
          npm run functions:validate
          npm run quality:release
      - name: Commit corrected branch and remove temporary workflows
        shell: bash
        run: |
          git rm .github/workflows/apply-v150-quality.yml
          git rm .github/workflows/source-snapshot.yml
          git add -A
          if git diff --cached --quiet; then
            echo 'No branch changes were produced.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m 'fix: satisfy v1.5.0 quality gates'
          git push origin HEAD:${{ github.head_ref || github.ref_name }}
