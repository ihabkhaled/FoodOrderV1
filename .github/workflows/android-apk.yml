name: Reusable Android APK

on:
  workflow_call:
    inputs:
      checkout_ref:
        description: 'Optional branch, tag, or commit SHA to build.'
        required: false
        type: string
        default: ''
      build_version:
        description: 'Optional explicit artifact version. Source manifests remain stable semver.'
        required: false
        type: string
        default: ''
    outputs:
      build_version:
        description: 'Resolved immutable APK artifact version.'
        value: ${{ jobs.build-apk.outputs.build_version }}

permissions:
  contents: read

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    outputs:
      build_version: ${{ steps.version.outputs.build_version }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          ref: ${{ inputs.checkout_ref || github.ref }}

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 26
          cache: npm

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Resolve build version
        id: version
        shell: bash
        env:
          REQUESTED_BUILD_VERSION: ${{ inputs.build_version }}
        run: |
          BASE="$(node -p "require('./package.json').version")"
          if [[ -n "${REQUESTED_BUILD_VERSION}" ]]; then
            BUILD_VERSION="${REQUESTED_BUILD_VERSION}"
          elif [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            BUILD_VERSION="${GITHUB_REF_NAME#v}"
          elif [[ "${GITHUB_REF}" == "refs/heads/main" ]]; then
            BUILD_VERSION="${BASE}-${GITHUB_RUN_NUMBER}"
          else
            BUILD_VERSION="${BASE}-dev.${GITHUB_RUN_NUMBER}"
          fi
          echo "build_version=${BUILD_VERSION}" >> "$GITHUB_OUTPUT"
          echo "BUILD_VERSION=${BUILD_VERSION}" >> "$GITHUB_ENV"
          echo "Resolved build version: ${BUILD_VERSION}"

      - name: Build web application
        env:
          VITE_FIREBASE_API_KEY: ${{ vars.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ vars.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_DATABASE_URL: ${{ vars.VITE_FIREBASE_DATABASE_URL }}
          VITE_FIREBASE_PROJECT_ID: ${{ vars.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ vars.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ vars.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ vars.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_MEASUREMENT_ID: ${{ vars.VITE_FIREBASE_MEASUREMENT_ID }}
        run: npm run build

      - name: Sync committed Android project
        run: npx cap sync android

      - name: Apply immutable build version to Android versionName
        shell: bash
        run: |
          sed -i "s/versionName \"[^\"]*\"/versionName \"${BUILD_VERSION}\"/" android/app/build.gradle
          grep -n 'versionName' android/app/build.gradle

      - name: Run Android lint
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew lintDebug --no-daemon --stacktrace

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Prepare versioned APK artifact
        run: |
          APK_NAME="FoodOrderV1-v${BUILD_VERSION}-${GITHUB_SHA::7}-debug.apk"
          cp android/app/build/outputs/apk/debug/app-debug.apk "$APK_NAME"
          sha256sum "$APK_NAME" | tee "$APK_NAME.sha256"
          printf 'APK_NAME=%s\n' "$APK_NAME" >> "$GITHUB_ENV"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v7
        with:
          name: FoodOrderV1-debug-apk
          path: |
            FoodOrderV1-*-debug.apk
            FoodOrderV1-*-debug.apk.sha256
          if-no-files-found: error
          retention-days: 30
