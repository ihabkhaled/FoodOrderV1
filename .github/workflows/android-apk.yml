name: Android APK

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Build web application
        run: npm run build

      - name: Generate and sync Android project
        run: |
          npx cap add android
          npx cap sync android

      - name: Build debug APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Prepare APK
        run: |
          cp android/app/build/outputs/apk/debug/app-debug.apk FoodOrderV1-debug.apk
          sha256sum FoodOrderV1-debug.apk | tee FoodOrderV1-debug.apk.sha256

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: FoodOrderV1-debug-apk
          path: |
            FoodOrderV1-debug.apk
            FoodOrderV1-debug.apk.sha256
          if-no-files-found: error
          retention-days: 7
