name: Reusable Android APK

on:
  workflow_call:

permissions:
  contents: read

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 26
          cache: npm

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Build web application
        env:
          VITE_FIREBASE_API_KEY: ${{ vars.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ vars.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_DATABASE_URL: ${{ vars.VITE_FIREBASE_DATABASE_URL }}
          VITE_FIREBASE_PROJECT_ID: ${{ vars.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ vars.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ vars.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ vars.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_MEASUREMENT_ID: ${{ vars.VITE_FIREBASE_MEASUREMENT_ID }}
        run: npm run build

      - name: Sync committed Android project
        run: npx cap sync android

      - name: Run Android lint
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew lintDebug --no-daemon --stacktrace

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Prepare versioned APK artifact
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          APK_NAME="FoodOrderV1-v${VERSION}-${GITHUB_SHA::7}-debug.apk"
          cp android/app/build/outputs/apk/debug/app-debug.apk "$APK_NAME"
          sha256sum "$APK_NAME" | tee "$APK_NAME.sha256"
          printf 'APK_NAME=%s\n' "$APK_NAME" >> "$GITHUB_ENV"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v7
        with:
          name: FoodOrderV1-debug-apk
          path: |
            FoodOrderV1-*-debug.apk
            FoodOrderV1-*-debug.apk.sha256
          if-no-files-found: error
          retention-days: 30
