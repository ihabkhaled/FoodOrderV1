name: Cross-Browser End-to-End

on:
  pull_request:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cross-browser-e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cross-browser:
    name: ${{ matrix.project }}
    runs-on: ubuntu-latest
    timeout-minutes: 28
    strategy:
      fail-fast: false
      matrix:
        include:
          - project: firefox
            browser: firefox
          - project: webkit
            browser: webkit
          - project: mobile-safari
            browser: webkit
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 26
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps ${{ matrix.browser }}
      - run: npx playwright test --project=${{ matrix.project }}
      - uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: playwright-${{ matrix.project }}-report
          path: |
            playwright-report/
            test-results/
          if-no-files-found: warn
