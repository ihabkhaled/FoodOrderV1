name: One-shot Emulator Dependencies

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/one-shot-emulator-dependencies.yml

permissions:
  contents: write

jobs:
  install:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: 26
          cache: npm
      - run: npm ci
      - name: Install current stable emulator dependencies
        run: npm install --save-dev --save-exact @firebase/rules-unit-testing@latest firebase-tools@latest
      - name: Validate dependency graph
        run: |
          npm run typecheck
          npm run build
          npm audit --audit-level=high
      - name: Remove temporary workflow and commit
        run: |
          rm .github/workflows/one-shot-emulator-dependencies.yml
          git config user.name "github-actions[bot]"
          git config user.email "4189828+github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json .github/workflows/one-shot-emulator-dependencies.yml
          git diff --cached --check
          git commit -m "test(firebase): add emulator rule testing toolchain"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
